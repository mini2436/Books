name: private_reader_mobile
description: "Private Reader Flutter app for Android-first mobile and tablet reading."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  file_picker: ^10.3.2
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: 10.0.0
  go_router: ^16.2.1
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0+3
  sqlite3_flutter_libs: ^0.6.0+eol
  webview_flutter: ^4.13.1
  webview_windows:
    path: packages/webview_windows

dependency_overrides:
  flutter_secure_storage_windows:
    path: packages/flutter_secure_storage_windows

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
