<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>批注管理 - Private Reader APP UI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Noto Sans SC", sans-serif;
    background: #F7F7F7;
    color: #1A1A1A;
    line-height: 1.5;
  }
  .demo-frame {
    display: flex;
    gap: 40px;
    padding: 40px;
    align-items: flex-end;
    justify-content: center;
    flex-wrap: wrap;
  }
  .device-label {
    text-align: center;
    font-size: 12px;
    color: #999;
    margin-bottom: 8px;
    letter-spacing: 0.1em;
  }
  .mobile-shell {
    width: 375px;
    height: 812px;
    background: #FFFFFF;
    border-radius: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .mobile-shell::before {
    content: "";
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 150px; height: 28px;
    background: #1A1A1A;
    border-bottom-left-radius: 18px;
    border-bottom-right-radius: 18px;
    z-index: 10;
  }

  .anno-drawer {
    width: 100%; height: 100%;
    background: #FFFFFF;
    display: flex;
    flex-direction: column;
  }
  .anno-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 52px 16px 12px;
    border-bottom: 1px solid #F2F2F2;
    font-size: 17px;
    font-weight: 600;
  }
  .anno-summary {
    padding: 12px 16px;
    font-size: 13px;
    color: #999;
  }
  .anno-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 16px;
  }
  .anno-card {
    padding: 14px;
    border: 1px solid #F2F2F2;
    border-radius: 12px;
    margin-bottom: 10px;
    background: #FAFAFA;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: background 100ms ease;
  }
  .anno-card:active { background: #F2F2F2; }
  .anno-card::before {
    content: "";
    position: absolute;
    left: 0; top: 14px; bottom: 14px;
    width: 4px;
    border-radius: 0 2px 2px 0;
  }
  .anno-card.yellow::before { background: #E6B800; }
  .anno-card.green::before { background: #4CAF50; }
  .anno-card.blue::before { background: #2196F3; }
  .anno-quote { font-size: 14px; color: #1A1A1A; line-height: 1.6; margin-bottom: 8px; padding-left: 10px; }
  .anno-note { font-size: 13px; color: #666; line-height: 1.5; padding-left: 10px; }
  .anno-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding-left: 10px;
    font-size: 12px;
    color: #999;
  }
  .anno-actions { display: flex; gap: 12px; }
  .anno-actions span { color: #7A4A24; cursor: pointer; }

  .compose-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease;
  }
  .compose-backdrop.show { opacity: 1; pointer-events: auto; }
  .compose-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: #FFFFFF;
    border-top-left-radius: 16px;
    border-top-right-radius: 16px;
    z-index: 35;
    padding: 16px;
    transform: translateY(100%);
    transition: transform 300ms cubic-bezier(0.32,0.72,0,1);
  }
  .compose-panel.show { transform: translateY(0); }
  .compose-quote {
    background: #F7F7F7;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    color: #666;
    line-height: 1.6;
    margin-bottom: 12px;
    border-left: 3px solid #7A4A24;
  }
  .compose-input {
    width: 100%;
    min-height: 80px;
    border: 1px solid #E5E5E5;
    border-radius: 10px;
    padding: 12px;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    outline: none;
  }
  .compose-input:focus { border-color: #7A4A24; }
  .compose-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
  }
  .color-dots { display: flex; gap: 8px; }
  .color-dot {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 100ms ease;
  }
  .color-dot.active { border-color: #1A1A1A; }
  .color-dot:active { transform: scale(0.9); }
  .compose-btns { display: flex; gap: 10px; }
  .btn-sm {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 14px;
    border: none;
    cursor: pointer;
    transition: transform 100ms ease;
  }
  .btn-sm:active { transform: scale(0.96); }
  .btn-secondary { background: #F2F2F2; color: #666; }
  .btn-primary { background: #7A4A24; color: #fff; }
</style>
</head>
<body>
<div class="demo-frame">
  <!-- Annotation List Drawer -->
  <div>
    <div class="device-label">MOBILE 批注列表</div>
    <div class="mobile-shell">
      <div class="anno-drawer">
        <div class="anno-header">
          <span>笔记</span>
          <span style="font-size:20px; color:#999; cursor:pointer;">×</span>
        </div>
        <div class="anno-summary">共 3 条笔记 · 按时间排序</div>
        <div class="anno-list">
          <div class="anno-card yellow" onclick="openCompose()">
            <div class="anno-quote">异构的IT基础设施环境导致开发和部署的系统应用纷繁复杂……</div>
            <div class="anno-note">这里说明了容器技术的必要性，是全书的核心论点。</div>
            <div class="anno-meta">
              <span>前言 · 2026-04-19</span>
              <div class="anno-actions"><span>定位</span><span>编辑</span></div>
            </div>
          </div>
          <div class="anno-card green" onclick="openCompose()">
            <div class="anno-quote">Kubernetes是CNCF旗下的第一个“毕业”项目……</div>
            <div class="anno-meta">
              <span>前言 · 2026-04-19</span>
              <div class="anno-actions"><span>定位</span><span>编辑</span></div>
            </div>
          </div>
          <div class="anno-card blue" onclick="openCompose()">
            <div class="anno-quote">以Docker为代表的应用容器技术为该难题的解决带来了一缕曙光……</div>
            <div class="anno-note">Docker 与 K8s 的关系值得深入理解。</div>
            <div class="anno-meta">
              <span>前言 · 2026-04-19</span>
              <div class="anno-actions"><span>定位</span><span>编辑</span></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Compose Panel -->
      <div class="compose-backdrop" id="composeBackdrop" onclick="closeCompose()"></div>
      <div class="compose-panel" id="composePanel">
        <div class="compose-quote">异构的IT基础设施环境导致开发和部署的系统应用纷繁复杂……</div>
        <textarea class="compose-input" placeholder="写下你的想法…"></textarea>
        <div class="compose-toolbar">
          <div class="color-dots">
            <div class="color-dot active" style="background:#E6B800;" onclick="selectColor(this)"></div>
            <div class="color-dot" style="background:#4CAF50;" onclick="selectColor(this)"></div>
            <div class="color-dot" style="background:#2196F3;" onclick="selectColor(this)"></div>
            <div class="color-dot" style="background:#FF5722;" onclick="selectColor(this)"></div>
          </div>
          <div class="compose-btns">
            <button class="btn-sm btn-secondary" onclick="closeCompose()">取消</button>
            <button class="btn-sm btn-primary" onclick="closeCompose()">保存</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function openCompose() {
    document.getElementById('composeBackdrop').classList.add('show');
    setTimeout(() => document.getElementById('composePanel').classList.add('show'), 10);
  }
  function closeCompose() {
    document.getElementById('composePanel').classList.remove('show');
    setTimeout(() => document.getElementById('composeBackdrop').classList.remove('show'), 300);
  }
  function selectColor(el) {
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
    el.classList.add('active');
  }
</script>
</body>
</html>
