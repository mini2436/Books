<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="ctaBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2747"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6" result="offsetBlur"/>
      <feFlood flood-color="#081526" flood-opacity="0.22" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="iconClip">
      <rect x="944" y="120" width="220" height="220" rx="40"/>
    </clipPath>
  </defs>

  <rect width="1280" height="720" fill="#F6F8FB"/>
  <rect x="54" y="40" width="8" height="36" rx="4" fill="#1565C0"/>
  <text x="78" y="68" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="34" font-weight="700" fill="#0F2747">下一阶段将把既有能力升级为统一的多端阅读与管理平台</text>
  <text x="1200" y="68" text-anchor="end" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="14" fill="#8893A3">08</text>

  <g id="roadmap">
    <text x="54" y="148" font-family='Georgia, SimSun, serif' font-size="42" font-weight="700" fill="#0F2747">Roadmap</text>
    <line x1="116" y1="220" x2="116" y2="566" stroke="#D6DDE8" stroke-width="6"/>

    <circle cx="116" cy="248" r="24" fill="#1565C0"/>
    <text x="168" y="242" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="24" font-weight="700" fill="#0F2747">阶段 A：基础收敛</text>
    <text x="168" y="272" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="18" fill="#1A2433">稳定 app 壳层、导航容器与主题 token</text>

    <circle cx="116" cy="358" r="24" fill="#1565C0"/>
    <text x="168" y="352" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="24" font-weight="700" fill="#0F2747">阶段 B：后台先行</text>
    <text x="168" y="382" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="18" fill="#1A2433">优先让后台管理能力在 Flutter Web/Desktop 落地</text>

    <circle cx="116" cy="468" r="24" fill="#2FA39A"/>
    <text x="168" y="462" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="24" font-weight="700" fill="#0F2747">阶段 C：书架与阅读器跨端</text>
    <text x="168" y="492" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="18" fill="#1A2433">迁移账户、书架和阅读器能力，建立统一前端体验</text>

    <circle cx="116" cy="578" r="24" fill="#2FA39A"/>
    <text x="168" y="572" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="24" font-weight="700" fill="#0F2747">阶段 D：平台价值释放</text>
    <text x="168" y="602" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="18" fill="#1A2433">面向团队、机构与企业沉淀长期可扩展的阅读基础设施</text>
  </g>

  <g id="value-panel">
    <rect x="730" y="96" width="496" height="560" rx="34" fill="url(#ctaBg)" filter="url(#shadow)"/>
    <image href="../images/private-reader-app-icon-preview-rounded.png" x="944" y="120" width="220" height="220" clip-path="url(#iconClip)" preserveAspectRatio="xMidYMid slice"/>
    <text x="770" y="394" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="28" font-weight="700" fill="#FFFFFF">项目价值不止于“做出一个 App”</text>
    <text x="770" y="430" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="20" fill="#DCE7F5">而在于沉淀一套可持续扩展的数字阅读平台基座。</text>

    <use data-icon="chunk/badge-check" x="770" y="474" width="24" height="24" fill="#FFFFFF"/>
    <text x="808" y="492" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="18" fill="#FFFFFF">适合作为团队书库、知识分发和阅读工作台的底座</text>
    <use data-icon="chunk/lightbulb" x="770" y="520" width="24" height="24" fill="#FFFFFF"/>
    <text x="808" y="538" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="18" fill="#FFFFFF">适合继续投入设计系统、审计统计、跨端适配与工作流能力</text>
    <use data-icon="chunk/globe" x="770" y="566" width="24" height="24" fill="#FFFFFF"/>
    <text x="808" y="584" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="18" fill="#FFFFFF">具备从移动阅读产品演进为机构级平台的路线清晰度</text>

    <text x="770" y="626" font-family='Georgia, SimSun, serif' font-size="24" fill="#FFFFFF">Private Reader / Build for Long-Term Reading Infrastructure</text>
  </g>
</svg>
