services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: private_reader
      POSTGRES_USER: reader
      POSTGRES_PASSWORD: reader
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    image: eclipse-temurin:21-jre
    working_dir: /workspace/backend
    command: sh -lc "java -jar /workspace/backend/app/build/libs/app-0.1.0.jar"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      APP_STORAGE_ROOT: /workspace/storage
      APP_SCAN_ROOT: /workspace/storage/nas
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/private_reader
      SPRING_DATASOURCE_USERNAME: reader
      SPRING_DATASOURCE_PASSWORD: reader
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      HTTP_PROXY: ${HTTP_PROXY:-http://host.docker.internal:10808}
      HTTPS_PROXY: ${HTTPS_PROXY:-http://host.docker.internal:10808}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1,host.docker.internal,postgres,redis,rabbitmq}
    depends_on:
      - postgres
      - redis
      - rabbitmq
    volumes:
      - ./:/workspace
    ports:
      - "8080:8080"

  web:
    image: node:20-alpine
    working_dir: /workspace/web
    command: sh -lc "npm install && npm run dev"
    volumes:
      - ./:/workspace
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      HTTP_PROXY: ${HTTP_PROXY:-http://host.docker.internal:10808}
      HTTPS_PROXY: ${HTTPS_PROXY:-http://host.docker.internal:10808}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1,host.docker.internal,backend,postgres,redis,rabbitmq}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres-data:

