<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EPUB 阅读器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.93/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #e5e5e5;
            --secondary-text: #a3a3a3;
            --accent-color: #f59e0b;
            --sidebar-bg: #262626;
            --border-color: #404040;
            --highlight-bg: rgba(245, 158, 11, 0.3);
            --selection-bg: rgba(245, 158, 11, 0.5);
        }

        .theme-light {
            --bg-color: #faf9f6;
            --text-color: #2d2d2d;
            --secondary-text: #6b7280;
            --accent-color: #d97706;
            --sidebar-bg: #ffffff;
            --border-color: #e5e7eb;
            --highlight-bg: rgba(217, 119, 6, 0.2);
            --selection-bg: rgba(217, 119, 6, 0.4);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Noto Serif SC', serif;
            transition: background-color 0.3s, color 0.3s;
            overflow: hidden;
        }

        /* 阅读区域样式 */
        #reader-container {
            height: 100vh;
            width: 100vw;
            position: relative;
            overflow: hidden;
        }

        #book-view {
            width: 100%;
            height: 100%;
            position: relative;
        }

        iframe {
            border: none;
            background: transparent !important;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--secondary-text);
        }

        /* 工具栏动画 */
        .toolbar {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .toolbar.hidden {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .bottom-toolbar.hidden {
            transform: translateY(100%);
        }

        /* 侧边栏动画 */
        .sidebar {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: var(--sidebar-bg);
        }

        .sidebar.closed {
            transform: translateX(-100%);
        }

        .sidebar-right {
            transform: translateX(100%);
        }
        .sidebar-right.open {
            transform: translateX(0);
        }

        /* 目录项样式 */
        .toc-item {
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        .toc-item:hover {
            background-color: rgba(245, 158, 11, 0.1);
            border-left-color: var(--accent-color);
            padding-left: 1.25rem;
        }
        .toc-item.active {
            background-color: rgba(245, 158, 11, 0.15);
            border-left-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* 批注高亮 */
        .annotation-highlight {
            background-color: var(--highlight-bg);
            border-bottom: 2px solid var(--accent-color);
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .annotation-highlight:hover {
            background-color: var(--selection-bg);
        }

        /* 批注卡片 */
        .annotation-card {
            transition: all 0.2s;
            border-left: 3px solid var(--accent-color);
        }
        .annotation-card:hover {
            transform: translateX(4px);
            background-color: rgba(245, 158, 11, 0.05);
        }

        /* 选中工具栏 */
        .selection-toolbar {
            position: absolute;
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: none;
            z-index: 1000;
            padding: 8px;
            gap: 8px;
            animation: popIn 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* 进度条 */
        .progress-bar {
            background: linear-gradient(to right, var(--accent-color) 0%, var(--accent-color) var(--progress), transparent var(--progress));
            height: 2px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
        }

        /* 加载动画 */
        .loader {
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 翻页区域 */
        .tap-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 33%;
            z-index: 10;
            cursor: pointer;
        }
        .tap-zone-left { left: 0; }
        .tap-zone-center { 
            left: 33%; 
            right: 33%; 
            width: auto;
            cursor: default;
        }
        .tap-zone-right { right: 0; }

        /* 字体大小调节 */
        .font-size-btn {
            transition: all 0.2s;
        }
        .font-size-btn:hover {
            background-color: var(--accent-color);
            color: white;
        }

        /* 主题切换按钮 */
        .theme-btn {
            transition: all 0.2s;
        }
        .theme-btn.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .sidebar {
                width: 85vw;
            }
            .toc-item {
                padding: 0.875rem 1rem;
            }
        }

        /* 批注输入框 */
        .annotation-input {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            resize: none;
            font-family: 'Inter', sans-serif;
        }
        .annotation-input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        /* 书籍封面占位 */
        .book-cover {
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .theme-light .book-cover {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="antialiased">

    <!-- 初始上传界面 -->
    <div id="upload-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[var(--bg-color)] transition-opacity duration-500">
        <div class="text-center space-y-8 p-8 max-w-md w-full">
            <div class="book-cover w-48 h-64 mx-auto rounded-lg flex items-center justify-center mb-8 relative overflow-hidden group cursor-pointer">
                <div class="absolute inset-0 bg-gradient-to-br from-amber-500/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <svg class="w-16 h-16 text-[var(--secondary-text)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-[var(--text-color)] mb-2">EPUB 阅读器</h1>
            <p class="text-[var(--secondary-text)] mb-8">支持批注、目录导航、多设备适配</p>
            
            <label class="relative group cursor-pointer block">
                <input type="file" id="file-input" accept=".epub" class="hidden">
                <div class="border-2 border-dashed border-[var(--border-color)] rounded-xl p-8 transition-all group-hover:border-[var(--accent-color)] group-hover:bg-[var(--accent-color)]/5">
                    <svg class="w-12 h-12 mx-auto text-[var(--secondary-text)] mb-4 group-hover:text-[var(--accent-color)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p class="text-[var(--text-color)] font-medium">点击或拖拽上传 EPUB 文件</p>
                    <p class="text-sm text-[var(--secondary-text)] mt-2">支持 .epub 格式</p>
                </div>
            </label>

            <button onclick="loadDemoBook()" class="mt-6 text-[var(--accent-color)] hover:underline text-sm">
                加载示例书籍（明朝那些事儿）
            </button>
        </div>
    </div>

    <!-- 主阅读器界面 -->
    <div id="reader-ui" class="hidden opacity-0 transition-opacity duration-500">
        
        <!-- 顶部工具栏 -->
        <header class="toolbar fixed top-0 left-0 right-0 z-40 bg-[var(--bg-color)]/90 border-b border-[var(--border-color)] px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-[var(--border-color)] rounded-lg transition-colors" title="目录">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <h2 id="book-title" class="font-semibold text-lg truncate max-w-[200px] md:max-w-md">未加载书籍</h2>
            </div>
            
            <div class="flex items-center gap-2">
                <button onclick="toggleAnnotations()" class="p-2 hover:bg-[var(--border-color)] rounded-lg transition-colors relative" title="批注">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"></path>
                    </svg>
                    <span id="annotation-badge" class="absolute top-1 right-1 w-2 h-2 bg-[var(--accent-color)] rounded-full hidden"></span>
                </button>
                <button onclick="toggleSettings()" class="p-2 hover:bg-[var(--border-color)] rounded-lg transition-colors" title="设置">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- 左侧目录栏 -->
        <aside id="sidebar-left" class="sidebar closed fixed left-0 top-0 bottom-0 w-80 z-30 border-r border-[var(--border-color)] pt-16 flex flex-col shadow-2xl">
            <div class="p-4 border-b border-[var(--border-color)]">
                <h3 class="font-semibold text-lg">目录</h3>
            </div>
            <div id="toc-container" class="flex-1 overflow-y-auto p-2 space-y-1">
                <!-- 动态生成目录 -->
            </div>
        </aside>

        <!-- 右侧批注栏 -->
        <aside id="sidebar-right" class="sidebar sidebar-right fixed right-0 top-0 bottom-0 w-96 z-30 border-l border-[var(--border-color)] pt-16 flex flex-col shadow-2xl bg-[var(--sidebar-bg)]">
            <div class="p-4 border-b border-[var(--border-color)] flex justify-between items-center">
                <h3 class="font-semibold text-lg">我的批注</h3>
                <button onclick="exportAnnotations()" class="text-sm text-[var(--accent-color)] hover:underline">导出</button>
            </div>
            <div id="annotations-container" class="flex-1 overflow-y-auto p-4 space-y-3">
                <div class="text-center text-[var(--secondary-text)] mt-8">
                    <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
                    </svg>
                    <p>选中文本即可添加批注</p>
                </div>
            </div>
        </aside>

        <!-- 设置面板 -->
        <div id="settings-panel" class="hidden fixed top-16 right-4 z-50 bg-[var(--sidebar-bg)] border border-[var(--border-color)] rounded-xl shadow-2xl p-6 w-80">
            <h4 class="font-semibold mb-4 text-sm uppercase tracking-wider text-[var(--secondary-text)]">阅读设置</h4>
            
            <div class="space-y-6">
                <!-- 主题 -->
                <div>
                    <label class="text-sm text-[var(--secondary-text)] mb-2 block">主题</label>
                    <div class="flex gap-2">
                        <button onclick="setTheme('dark')" class="theme-btn flex-1 py-2 px-3 rounded-lg border border-[var(--border-color)] text-sm active" data-theme="dark">深色</button>
                        <button onclick="setTheme('light')" class="theme-btn flex-1 py-2 px-3 rounded-lg border border-[var(--border-color)] text-sm" data-theme="light">浅色</button>
                        <button onclick="setTheme('sepia')" class="theme-btn flex-1 py-2 px-3 rounded-lg border border-[var(--border-color)] text-sm" data-theme="sepia"> sepia</button>
                    </div>
                </div>

                <!-- 字体大小 -->
                <div>
                    <label class="text-sm text-[var(--secondary-text)] mb-2 block">字号 <span id="font-size-display" class="ml-2 text-[var(--text-color)]">18px</span></label>
                    <div class="flex items-center gap-3">
                        <button onclick="changeFontSize(-2)" class="font-size-btn w-10 h-10 rounded-lg border border-[var(--border-color)] flex items-center justify-center text-lg">A-</button>
                        <div class="flex-1 h-2 bg-[var(--border-color)] rounded-full relative">
                            <div id="font-size-bar" class="absolute left-0 top-0 h-full bg-[var(--accent-color)] rounded-full transition-all" style="width: 50%"></div>
                        </div>
                        <button onclick="changeFontSize(2)" class="font-size-btn w-10 h-10 rounded-lg border border-[var(--border-color)] flex items-center justify-center text-lg font-bold">A+</button>
                    </div>
                </div>

                <!-- 字体 -->
                <div>
                    <label class="text-sm text-[var(--secondary-text)] mb-2 block">字体</label>
                    <select onchange="changeFont(this.value)" class="w-full bg-[var(--bg-color)] border border-[var(--border-color)] rounded-lg px-3 py-2 text-[var(--text-color)] focus:border-[var(--accent-color)] outline-none">
                        <option value="'Noto Serif SC', serif">思源宋体</option>
                        <option value="'Inter', sans-serif">无衬线体</option>
                        <option value="Georgia, serif">Georgia</option>
                        <option value="monospace">等宽字体</option>
                    </select>
                </div>

                <!-- 行间距 -->
                <div>
                    <label class="text-sm text-[var(--secondary-text)] mb-2 block">行间距</label>
                    <div class="flex gap-2">
                        <button onclick="setLineHeight(1.4)" class="flex-1 py-2 rounded-lg border border-[var(--border-color)] text-sm hover:border-[var(--accent-color)]">紧凑</button>
                        <button onclick="setLineHeight(1.8)" class="flex-1 py-2 rounded-lg border border-[var(--border-color)] text-sm hover:border-[var(--accent-color)] border-[var(--accent-color)]">适中</button>
                        <button onclick="setLineHeight(2.2)" class="flex-1 py-2 rounded-lg border border-[var(--border-color)] text-sm hover:border-[var(--accent-color)]">宽松</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 阅读区域 -->
        <main class="relative h-screen w-full pt-14 pb-12">
            <div id="book-view" class="w-full h-full px-4 md:px-8 lg:px-16 overflow-hidden"></div>
            
            <!-- 点击区域 -->
            <div class="tap-zone tap-zone-left" onclick="prevPage()"></div>
            <div class="tap-zone tap-zone-center" onclick="toggleToolbar()"></div>
            <div class="tap-zone tap-zone-right" onclick="nextPage()"></div>

            <!-- 选中工具栏 -->
            <div id="selection-toolbar" class="selection-toolbar flex items-center">
                <button onclick="highlightSelection()" class="p-2 hover:bg-[var(--border-color)] rounded-lg text-[var(--accent-color)]" title="高亮">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                </button>
                <button onclick="addAnnotation()" class="p-2 hover:bg-[var(--border-color)] rounded-lg text-[var(--accent-color)]" title="批注">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                    </svg>
                </button>
                <button onclick="copySelection()" class="p-2 hover:bg-[var(--border-color)] rounded-lg" title="复制">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                    </svg>
                </button>
                <div class="w-px h-6 bg-[var(--border-color)] mx-1"></div>
                <button onclick="clearSelection()" class="p-2 hover:bg-[var(--border-color)] rounded-lg text-[var(--secondary-text)]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <!-- 批注输入框 -->
            <div id="annotation-input-box" class="hidden fixed z-50 bg-[var(--sidebar-bg)] border border-[var(--border-color)] rounded-xl shadow-2xl p-4 w-80">
                <div class="text-sm text-[var(--secondary-text)] mb-2">添加批注</div>
                <textarea id="annotation-text" class="annotation-input w-full h-24 rounded-lg p-3 text-sm mb-3" placeholder="写下你的想法..."></textarea>
                <div class="flex justify-end gap-2">
                    <button onclick="cancelAnnotation()" class="px-4 py-2 text-sm text-[var(--secondary-text)] hover:text-[var(--text-color)]">取消</button>
                    <button onclick="saveAnnotation()" class="px-4 py-2 text-sm bg-[var(--accent-color)] text-white rounded-lg hover:bg-amber-600">保存</button>
                </div>
            </div>
        </main>

        <!-- 底部工具栏 -->
        <footer class="bottom-toolbar toolbar fixed bottom-0 left-0 right-0 z-40 bg-[var(--bg-color)]/90 border-t border-[var(--border-color)] px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-4 text-sm text-[var(--secondary-text)]">
                <span id="current-location">第 1 页</span>
                <span class="text-[var(--border-color)]">|</span>
                <span id="progress-percent">0%</span>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="prevPage()" class="p-2 hover:bg-[var(--border-color)] rounded-lg transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>
                <button onclick="nextPage()" class="p-2 hover:bg-[var(--border-color)] rounded-lg transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>
            </div>
        </footer>

        <!-- 进度条 -->
        <div class="progress-bar" style="--progress: 0%"></div>

        <!-- 加载指示器 -->
        <div id="loading" class="hidden fixed inset-0 z-50 bg-[var(--bg-color)]/90 flex items-center justify-center">
            <div class="loader"></div>
        </div>
    </div>

    <script>
        // 全局变量
        let book = null;
        let rendition = null;
        let currentLocation = null;
        let annotations = [];
        let selectedRange = null;
        let currentTheme = 'dark';
        let fontSize = 18;
        let isToolbarVisible = true;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initFileUpload();
            initKeyboardShortcuts();
            initSelectionHandler();
        });

        // 文件上传处理
        function initFileUpload() {
            const fileInput = document.getElementById('file-input');
            const uploadScreen = document.getElementById('upload-screen');
            
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) loadBook(file);
            });

            // 拖拽支持
            uploadScreen.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadScreen.querySelector('.border-dashed').classList.add('border-[var(--accent-color)]', 'bg-[var(--accent-color)]/5');
            });

            uploadScreen.addEventListener('dragleave', () => {
                uploadScreen.querySelector('.border-dashed').classList.remove('border-[var(--accent-color)]', 'bg-[var(--accent-color)]/5');
            });

            uploadScreen.addEventListener('drop', (e) => {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                if (file && file.name.endsWith('.epub')) {
                    loadBook(file);

        // 加载真实 EPUB
        function loadBook(file) {
            showLoading(true);
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const bookData = e.target.result;
                
                try {
                    book = ePub(bookData);
                    
                    book.loaded.metadata.then((meta) => {
                        document.getElementById('book-title').textContent = meta.title || '未知书籍';
                    });

                    book.loaded.navigation.then((nav) => {
                        renderToc(nav.toc);
                    });

                    // 渲染书籍
                    rendition = book.renderTo('book-view', {
                        width: '100%',
                        height: '100%',
                        spread: 'auto',
                        flow: 'paginated'
                    });

                    rendition.display();
                    
                    // 事件监听
                    rendition.on('relocated', (location) => {
                        currentLocation = location;
                        updateProgress(location);
                    });

                    rendition.on('selected', (cfiRange, contents) => {
                        handleSelection(cfiRange, contents);
                    });

                    // 切换界面
                    document.getElementById('upload-screen').classList.add('opacity-0', 'pointer-events-none');
                    document.getElementById('reader-ui').classList.remove('hidden');
                    setTimeout(() => document.getElementById('reader-ui').classList.remove('opacity-0'), 100);
                    
                    showLoading(false);
                    applyReaderStyles();

                } catch (err) {
                    alert('加载书籍失败：' + err.message);
                    showLoading(false);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // 渲染目录
        function renderToc(toc) {
            const container = document.getElementById('toc-container');
            container.innerHTML = '';
            
            function createTocItem(item, level = 0) {
                const div = document.createElement('div');
                div.className = `toc-item p-3 rounded-lg cursor-pointer text-sm ${level > 0 ? 'pl-' + (4 + level * 4) : ''}`;
                div.style.paddingLeft = `${1 + level * 0.5}rem`;
                div.textContent = item.label;
                div.onclick = () => {
                    if (rendition) {
                        rendition.display(item.href);
                        toggleSidebar(false);
                    }
                };
                container.appendChild(div);
                
                if (item.subitems) {
                    item.subitems.forEach(sub => createTocItem(sub, level + 1));
                }
            }
            
            toc.forEach(item => createTocItem(item));
        }

        function initSelectionHandler() {

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.selection-toolbar') && !e.target.closest('#annotation-input-box')) {
                    // 延迟检查，确保不是选中文本的操作
                    setTimeout(() => {
                        const selection = window.getSelection();
                        if (selection.toString().trim().length === 0) {
                            hideSelectionToolbar();

                        }
                    }, 100);
                }
            });
        }

        function showSelectionToolbar(selection) {
            const toolbar = document.getElementById('selection-toolbar');
            const range = selection.getRangeAt(0);
            const rect = range.getBoundingClientRect();
            
            // 保存选中范围
            selectedRange = range.cloneRange();
            
            // 定位工具栏
            const toolbarWidth = 200;
            let left = rect.left + (rect.width / 2) - (toolbarWidth / 2);
            let top = rect.top - 50;
            
            // 边界检查
            if (left < 10) left = 10;
            if (left + toolbarWidth > window.innerWidth - 10) left = window.innerWidth - toolbarWidth - 10;
            if (top < 60) top = rect.bottom + 10;
            
            toolbar.style.left = left + 'px';
            toolbar.style.top = top + 'px';
            toolbar.style.display = 'flex';
        }

        function hideSelectionToolbar() {
            document.getElementById('selection-toolbar').style.display = 'none';
        }

        function clearSelection() {
            window.getSelection().removeAllRanges();
            hideSelectionToolbar();

            if (!selectedRange) return;
            
            const span = document.createElement('span');
            span.className = 'annotation-highlight';
            span.dataset.id = Date.now();
            
            try {
                selectedRange.surroundContents(span);
                saveAnnotationToStorage({
                    id: span.dataset.id,
                    type: 'highlight',
                    text: selectedRange.toString(),
                    cfi: selectedRange.toString(),
                    timestamp: new Date().toISOString()

                if (!styleEl) {
                    styleEl = iframe.contentDocument.createElement('style');
                    styleEl.id = 'reader-style';
                    iframe.contentDocument.head.appendChild(styleEl);
                }
                styleEl.textContent = style;
            }
            
            if (rendition) {
                rendition.themes.register('custom', {
                    'body': {
                        'font-size': fontSize + 'px',
                        'font-family': document.body.style.fontFamily || "'Noto Serif SC', serif",
                        'line-height': '1.8',
                        'color': getComputedStyle(document.body).getPropertyValue('--text-color')
                    }
                });
                rendition.themes.select('custom');
            }
        }

        // 键盘快捷键
        function initKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'TEXTAREA') return;
                
                switch(e.key) {
                    case 'ArrowLeft':
                    case 'PageUp':
                        prevPage();
                        break;
                    case 'ArrowRight':
                    case 'PageDown':
                    case ' ':
                        nextPage();
                        break;
                    case 'Escape':
                        toggleSidebar(false);
                        document.getElementById('sidebar-right').classList.remove('open');
                        document.getElementById('settings-panel').classList.add('hidden');
                        break;
                }
            });
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('hidden', !show);
        }

        // 点击外部关闭设置面板
        document.addEventListener('click', (e) => {
            const settings = document.getElementById('settings-panel');
            const settingsBtn = e.target.closest('button[onclick="toggleSettings()"]');
            if (!settings.contains(e.target) && !settingsBtn) {
                settings.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
