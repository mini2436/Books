<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8" result="offsetBlur"/>
      <feFlood flood-color="#5B6678" flood-opacity="0.18" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="navClip">
      <rect x="678" y="142" width="396" height="252" rx="26"/>
    </clipPath>
    <clipPath id="phoneLeft">
      <rect x="620" y="126" width="92" height="242" rx="24"/>
    </clipPath>
    <clipPath id="phoneRight">
      <rect x="1102" y="126" width="92" height="242" rx="24"/>
    </clipPath>
    <clipPath id="reader1">
      <rect x="702" y="430" width="146" height="174" rx="22"/>
    </clipPath>
    <clipPath id="reader2">
      <rect x="870" y="430" width="146" height="174" rx="22"/>
    </clipPath>
    <clipPath id="reader3">
      <rect x="1038" y="430" width="146" height="174" rx="22"/>
    </clipPath>
  </defs>

  <rect width="1280" height="720" fill="#F6F8FB"/>
  <circle cx="1164" cy="118" r="130" fill="#1565C0" fill-opacity="0.08"/>

  <rect x="54" y="40" width="8" height="36" rx="4" fill="#1565C0"/>
  <text x="78" y="68" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="34" font-weight="700" fill="#0F2747">Flutter App 已具备真实可感知的阅读体验与管理入口</text>
  <text x="1200" y="68" text-anchor="end" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="14" fill="#8893A3">04</text>

  <rect x="54" y="92" width="1172" height="54" rx="16" fill="#E9EEF5"/>
  <text x="78" y="126" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="18" fill="#1A2433">从登录、书架到阅读器与后台入口，产品体验已经形成连续路径，而不是零散页面集合。</text>

  <g id="left-content">
    <text x="54" y="236" font-family='Georgia, SimSun, serif' font-size="44" font-weight="700" fill="#0F2747">A Real Product Flow</text>
    <text x="54" y="284" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="24" font-weight="700" fill="#1565C0">体验重点不只是“能看书”，而是“能持续使用”。</text>
    <text x="54" y="338" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="20" fill="#1A2433">登录、书架、阅读器、设置、批注、后台入口已形成稳定骨架，</text>
    <text x="54" y="370" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="20" fill="#1A2433">并且手机与平板共享一套 Flutter 代码基线。</text>

    <rect x="54" y="430" width="212" height="44" rx="22" fill="#1565C0" fill-opacity="0.10"/>
    <text x="160" y="458" text-anchor="middle" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="18" font-weight="700" fill="#1565C0">登录与会话恢复</text>
    <rect x="54" y="490" width="244" height="44" rx="22" fill="#1565C0" fill-opacity="0.10"/>
    <text x="176" y="518" text-anchor="middle" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="18" font-weight="700" fill="#1565C0">书架到阅读器完整闭环</text>
    <rect x="54" y="550" width="232" height="44" rx="22" fill="#1565C0" fill-opacity="0.10"/>
    <text x="170" y="578" text-anchor="middle" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="18" font-weight="700" fill="#1565C0">浮层式阅读器交互</text>
    <rect x="54" y="610" width="220" height="44" rx="22" fill="#2FA39A" fill-opacity="0.16"/>
    <text x="164" y="638" text-anchor="middle" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="18" font-weight="700" fill="#1A2433">多主题与设置能力</text>
  </g>

  <g id="visual-showcase">
    <rect x="600" y="110" width="626" height="536" rx="32" fill="#FFFFFF" stroke="#D6DDE8" stroke-width="1.5" filter="url(#shadow)"/>
    <image href="../images/prototype-nav.png" x="678" y="142" width="396" height="252" clip-path="url(#navClip)" preserveAspectRatio="xMidYMid slice"/>
    <image href="../images/login-prototype.png" x="620" y="126" width="92" height="242" clip-path="url(#phoneLeft)" preserveAspectRatio="xMidYMid slice"/>
    <image href="../images/bookshelf-prototype.png" x="1102" y="126" width="92" height="242" clip-path="url(#phoneRight)" preserveAspectRatio="xMidYMid slice"/>

    <image href="../images/reader-kraft-prototype.png" x="702" y="430" width="146" height="174" clip-path="url(#reader1)" preserveAspectRatio="xMidYMid slice"/>
    <image href="../images/reader-light-prototype.png" x="870" y="430" width="146" height="174" clip-path="url(#reader2)" preserveAspectRatio="xMidYMid slice"/>
    <image href="../images/reader-night-prototype.png" x="1038" y="430" width="146" height="174" clip-path="url(#reader3)" preserveAspectRatio="xMidYMid slice"/>

    <text x="730" y="410" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="16" fill="#5B6678">导航壳层与后台入口</text>
    <text x="737" y="625" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="15" fill="#5B6678">阅读主题示意：Kraft / Light / Night</text>
  </g>

  <text x="54" y="687" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="12" fill="#8893A3">Source: docs/第一阶段详细功能文档.md, docs/Flutter应用架构文档.md, project prototype images</text>
</svg>
