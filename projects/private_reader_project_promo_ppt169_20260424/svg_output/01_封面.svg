<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="coverBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2747"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <radialGradient id="coverGlow" cx="84%" cy="18%" r="52%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8" result="offsetBlur"/>
      <feFlood flood-color="#081526" flood-opacity="0.30" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="iconClip">
      <rect x="846" y="108" width="318" height="318" rx="46"/>
    </clipPath>
  </defs>

  <rect width="1280" height="720" fill="url(#coverBg)"/>
  <rect width="1280" height="720" fill="url(#coverGlow)"/>
  <circle cx="1030" cy="130" r="220" fill="#FFFFFF" fill-opacity="0.07"/>
  <circle cx="1080" cy="610" r="180" fill="#2FA39A" fill-opacity="0.10"/>
  <path d="M700 92 H1190" stroke="#FFFFFF" stroke-opacity="0.20" stroke-width="2"/>
  <path d="M742 618 H1190" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="2"/>

  <g id="headline">
    <text x="72" y="154" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="16" letter-spacing="4" fill="#DCE7F5">
      PRIVATE READER PROJECT
    </text>
    <text x="72" y="252" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="66" font-weight="700" fill="#FFFFFF">
      Private Reader
    </text>
    <text x="72" y="316" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="30" font-weight="600" fill="#EAF1FA">
      面向团队与机构的私有阅读平台
    </text>
    <text x="72" y="376" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="22" fill="#D6E2F1">
      自托管、多用户、可扩展、离线优先
    </text>
    <text x="72" y="412" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="22" fill="#D6E2F1">
      以 Flutter 多端演进为方向的企业级阅读基础设施
    </text>
  </g>

  <g id="tags">
    <rect x="72" y="470" width="158" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.14"/>
    <text x="151" y="497" text-anchor="middle" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="17" font-weight="600" fill="#FFFFFF">Self-Hosted</text>
    <rect x="244" y="470" width="158" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.14"/>
    <text x="323" y="497" text-anchor="middle" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="17" font-weight="600" fill="#FFFFFF">Offline-First</text>
    <rect x="416" y="470" width="158" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.14"/>
    <text x="495" y="497" text-anchor="middle" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="17" font-weight="600" fill="#FFFFFF">Multi-User</text>
  </g>

  <g id="visual-panel">
    <rect x="792" y="74" width="424" height="572" rx="34" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="1.5" filter="url(#shadow)"/>
    <image href="../images/private-reader-app-icon-preview-rounded.png" x="846" y="108" width="318" height="318" clip-path="url(#iconClip)" preserveAspectRatio="xMidYMid slice"/>

    <g id="capability-1">
      <rect x="838" y="454" width="108" height="116" rx="20" fill="#FFFFFF"/>
      <use data-icon="chunk/book-open" x="874" y="482" width="36" height="36" fill="#1565C0"/>
      <text x="892" y="536" text-anchor="middle" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="16" font-weight="700" fill="#0F2747">阅读闭环</text>
      <text x="892" y="560" text-anchor="middle" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="13" fill="#5B6678">Reader</text>
    </g>

    <g id="capability-2">
      <rect x="950" y="454" width="108" height="116" rx="20" fill="#FFFFFF"/>
      <use data-icon="chunk/shield" x="986" y="482" width="36" height="36" fill="#1565C0"/>
      <text x="1004" y="536" text-anchor="middle" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="16" font-weight="700" fill="#0F2747">权限治理</text>
      <text x="1004" y="560" text-anchor="middle" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="13" fill="#5B6678">Admin</text>
    </g>

    <g id="capability-3">
      <rect x="1062" y="454" width="108" height="116" rx="20" fill="#FFFFFF"/>
      <use data-icon="chunk/cloud-arrow-up" x="1098" y="482" width="36" height="36" fill="#1565C0"/>
      <text x="1116" y="536" text-anchor="middle" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="16" font-weight="700" fill="#0F2747">同步基础</text>
      <text x="1116" y="560" text-anchor="middle" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="13" fill="#5B6678">Sync</text>
    </g>
  </g>

  <g id="footer">
    <text x="72" y="660" font-family='Georgia, SimSun, serif' font-size="18" fill="#EAF1FA">Business-Style Promo Deck</text>
    <text x="1168" y="660" text-anchor="end" font-family='"Microsoft YaHei", "PingFang SC", Arial, sans-serif' font-size="14" fill="#D6E2F1">01</text>
  </g>
</svg>
